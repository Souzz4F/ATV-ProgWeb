    <h1>Essa é a pagina de Login</h1>
    <form>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" [(ngModel)]="user.email"><br><br>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" [(ngModel)]="user.senha"><br><br>
        <button (click)="Entrar()">Entrar</button>
    </form>
