<h1>Essa é a pagina de reenvio de Senhas</h1>
<label for="email">Email</label>
<input type="email" id="email" name="email" placeholder="Digite seu email" [(ngModel)]="reenviar.email"><br><br>
<label for="confirmarEmail">Confirmar Email</label>
<input type="email" id="confirmarEmail" name="confirmarEmail" placeholder="Confirme seu email" [(ngModel)]="reenviar.confirmarEmail"><br><br>
<button (click)="reenvioSenha()">Reenviar Senha</button>
